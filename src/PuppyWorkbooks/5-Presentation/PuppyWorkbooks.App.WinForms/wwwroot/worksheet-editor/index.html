<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluent Formula Editor</title>

    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <div class="top-bar">
        <div class="worksheet-name">
            <label for="worksheetNameField">Worksheet Name</label>
            <fluent-text-field id="worksheetNameField" placeholder="Enter worksheet name"></fluent-text-field>
        </div>
        <div class="top-bar-actions">
            <fluent-button appearance="outline" id="runSelectedBtn">Run up to Selected</fluent-button>
            <fluent-button appearance="accent" id="runAllBtn">Run All</fluent-button>
        </div>
    </div>

    <div class="app-container">

        <!-- LEFT: LIST -->
        <div class="list-container">
            <div class="list-header">
                <fluent-button appearance="outline" id="addBtn">Add Formula</fluent-button>
            </div>
            <div id="formulaList"></div>
        </div>

        <!-- RIGHT: EDIT PANEL -->
        <div class="edit-panel" id="editPanel">

            <h2>Edit Formula</h2>

            <label>Name</label>
            <fluent-text-field id="nameField"></fluent-text-field>

            <label>Formula</label>
            <div id="formulaEditor" class="code-editor" aria-label="Formula editor"></div>

            <label>Comments</label>
            <fluent-text-area id="commentsField"></fluent-text-area>

            <label>Result</label>
            <fluent-text-field id="resultField"></fluent-text-field>

            <fluent-button appearance="accent" id="removeBtn" class="remove-btn">
                Remove
            </fluent-button>
        </div>

    </div>

    <!-- CodeMirror-powered formula editor -->
    <script type="module" src="./app.ts"></script>

    <pre id="log"></pre>
</body>

</html>
